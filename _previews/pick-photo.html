<!DOCTYPE html>
<html lang="ro"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alege poza</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:system-ui,sans-serif;padding:24px}
h1{font-size:1.3rem;margin:0 0 6px}p{color:#aaa;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
.c{border:2px solid #333;border-radius:10px;overflow:hidden;background:#000}
.c img{width:100%;height:240px;object-fit:cover;display:block}
.c .n{padding:10px 14px;font-weight:700;font-size:1.1rem;background:#1a1a1a;display:flex;justify-content:space-between}
.c .n span{color:#ffd23f}
</style></head><body>
<h1>Alege poza de stație</h1>
<p>Spune-mi numărul care îți place (sau atașează-mi tu altă poză). O folosesc ca fundal.</p>
<div class="grid">
  <div class="c"><img src="cand1.jpg"><div class="n">Poza 1 <span>platform</span></div></div>
  <div class="c"><img src="cand2.jpg"><div class="n">Poza 2 <span>underground</span></div></div>
  <div class="c"><img src="cand3.jpg"><div class="n">Poza 3 <span>tiles</span></div></div>
  <div class="c"><img src="cand4.jpg"><div class="n">Poza 4 <span>train</span></div></div>
  <div class="c"><img src="cand5.jpg"><div class="n">Poza 5 <span>tunnel</span></div></div>
</div>
</body></html>
